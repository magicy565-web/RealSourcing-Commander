version: "3.9"

# ============================================================
# RealSourcing Commander 5.0 — Docker Compose (Phase 3 M7)
# 用法:
#   docker-compose up -d
#   docker-compose logs -f commander
# ============================================================

services:
  commander:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realsourcing-commander
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - DB_PATH=/app/data/commander.db
    volumes:
      # 持久化 SQLite 数据库
      - commander_data:/app/data
      # 持久化日志
      - commander_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.commander.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.services.commander.loadbalancer.server.port=4000"

volumes:
  commander_data:
    driver: local
  commander_logs:
    driver: local
